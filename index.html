<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Impacta+ | Login Corporativo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f1f5f9;
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .login-wrapper {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        padding: 40px;
        box-sizing: border-box;
      }
      .logo-section {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 32px;
      }
      .logo-section span {
        font-size: 28px;
      }
      .logo-section h2 {
        margin: 0;
        color: #0f172a;
        font-size: 26px;
      }
      .logo-section .highlight {
        color: #22c55e;
      }
      h1 {
        font-size: 24px;
        color: #0f172a;
        margin: 0 0 8px 0;
        text-align: center;
      }
      p.subtitle {
        color: #64748b;
        margin: 0 0 32px 0;
        font-size: 14px;
        text-align: center;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 20px;
      }
      .input-group label {
        font-size: 13px;
        font-weight: 500;
        color: #334155;
      }
      .input-group input {
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
      }
      .input-group input:focus {
        border-color: #22c55e;
      }

      .btn-submit {
        background: linear-gradient(135deg, #22c55e 0%, #3b82f6 100%);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-top: 8px;
        transition: opacity 0.2s;
      }
      .btn-submit:hover {
        opacity: 0.95;
      }
      .footer-text {
        text-align: center;
        margin-top: 24px;
        font-size: 13px;
        color: #64748b;
      }
      .footer-text a {
        color: #22c55e;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    <div class="login-wrapper">
      <div class="logo-section">
        <span>🌱</span>
        <h2>Impacta<span class="highlight">+</span></h2>
      </div>
      <h1>Bem-vindo de volta!</h1>
      <p class="subtitle">Acesse o painel de impacto da sua organização.</p>

      <form id="loginForm">
        <div class="input-group">
          <label>E-mail Corporativo</label>
          <input
            type="email"
            id="email"
            placeholder="Digite seu e-mail"
            required
          />
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
            required
          />
        </div>

        <button type="submit" class="btn-submit">Entrar no painel →</button>
      </form>

      <p class="footer-text" style="margin-top: 16px">
        <a href="esqueci-senha.html" style="color: #64748b"
          >Esqueceu a senha?</a
        >
      </p>

      <p class="footer-text">
        Ainda não cadastrou sua ONG/Empresa?
        <a href="cadastro.html">Criar conta</a>
      </p>
    </div>

    <script>
      document
        .getElementById('loginForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();

          const payload = {
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value,
          };

          // Fazendo o POST para a rota de Login no C#
          fetch('http://localhost:5000/api/login/entrar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          })
            .then(response =>
              response
                .json()
                .then(data => ({ status: response.status, body: data })),
            )
            .then(resultado => {
              if (resultado.status === 200) {
                // Se o C# autorizou (Status 200 OK)
                localStorage.setItem(
                  'nomeUsuarioLogado',
                  resultado.body.nomeUsuario,
                );
                alert(
                  'Olá, ' +
                    resultado.body.nomeUsuario +
                    '! ' +
                    resultado.body.mensagem,
                );
                window.location.href = 'dashboard.html';
              } else {
                // Se o C# barrou (Status 401 Unauthorized)
                alert('Erro: ' + resultado.body.mensagem);
              }
            })
            .catch(erro => {
              console.error('Falha na requisição:', erro);
              alert(
                'Não foi possível conectar com o servidor. A API C# está rodando?',
              );
            });
        });
    </script>
  </body>
</html>
