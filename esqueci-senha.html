<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Impacta+ | Recuperar Senha</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f1f5f9;
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .login-wrapper {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        padding: 40px;
        box-sizing: border-box;
      }
      .logo-section {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 24px;
      }
      .logo-section span {
        font-size: 28px;
      }
      .logo-section h2 {
        margin: 0;
        color: #0f172a;
        font-size: 26px;
      }
      .logo-section .highlight {
        color: #22c55e;
      }
      h1 {
        font-size: 22px;
        color: #0f172a;
        margin: 0 0 8px 0;
        text-align: center;
      }
      p.subtitle {
        color: #64748b;
        margin: 0 0 32px 0;
        font-size: 14px;
        text-align: center;
        line-height: 1.5;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 20px;
      }
      .input-group label {
        font-size: 13px;
        font-weight: 500;
        color: #334155;
      }
      .input-group input {
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
      }
      .input-group input:focus {
        border-color: #22c55e;
      }

      .btn-submit {
        background: linear-gradient(135deg, #22c55e 0%, #3b82f6 100%);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-top: 8px;
        transition: opacity 0.2s;
      }
      .btn-submit:hover {
        opacity: 0.95;
      }
      .footer-text {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
      }
      .footer-text a {
        color: #64748b;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }
      .footer-text a:hover {
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="logo-section">
        <span>🌱</span>
        <h2>Impacta<span class="highlight">+</span></h2>
      </div>
      <h1>Esqueceu sua senha?</h1>
      <p class="subtitle">
        Não se preocupe. Digite o e-mail associado à sua conta e enviaremos um
        link de recuperação.
      </p>

      <form id="recuperarForm">
        <div class="input-group">
          <label>E-mail Corporativo</label>
          <input
            type="email"
            id="emailRecuperacao"
            placeholder="Digite seu e-mail"
            required
          />
        </div>

        <button type="submit" class="btn-submit">
          Enviar link de recuperação
        </button>
      </form>

      <p class="footer-text"><a href="index.html">← Voltar para o Login</a></p>
    </div>

    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    <script>
      document
        .getElementById('recuperarForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();

          const payload = {
            email: document.getElementById('emailRecuperacao').value,
          };

          const botao = document.querySelector('.btn-submit');
          botao.innerText = 'Enviando...';
          botao.disabled = true;

          fetch('http://localhost:5000/api/login/recuperar-senha', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          })
            .then(response =>
              response
                .json()
                .then(data => ({ status: response.status, body: data })),
            )
            .then(resultado => {
              botao.innerText = 'Enviar link de recuperação';
              botao.disabled = false;

              if (resultado.status === 200) {
                alert('✅ ' + resultado.body.mensagem);
                document.getElementById('recuperarForm').reset();
                window.location.href = 'index.html'; // Joga o usuário de volta pro login
              } else {
                alert('❌ Erro: ' + resultado.body.mensagem);
              }
            })
            .catch(erro => {
              console.error('Falha:', erro);
              botao.innerText = 'Enviar link de recuperação';
              botao.disabled = false;
              alert('Não foi possível conectar com o servidor.');
            });
        });
    </script>
  </body>
</html>
